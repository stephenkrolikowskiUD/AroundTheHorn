<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Around the Horn</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>body{margin:0;padding:0;background:#0d0d0d;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var R = React;
var useState = R.useState;

var E = {
  fire: String.fromCodePoint(0x1F525),
  bat: String.fromCodePoint(0x1F3CF),
  flex: String.fromCodePoint(0x1F4AA),
  bomb: String.fromCodePoint(0x1F4A3),
  arm: String.fromCodePoint(0x1FAB6),
  walk: String.fromCodePoint(0x1F6B6),
  zap: String.fromCodePoint(0x26A1),
  punch: String.fromCodePoint(0x1F4A5),
  door: String.fromCodePoint(0x1F6AA),
  trophy: String.fromCodePoint(0x1F3C6),
  lock: String.fromCodePoint(0x1F512),
  money: String.fromCodePoint(0x1F4B0),
  chart: String.fromCodePoint(0x1F4C8),
  moon: String.fromCodePoint(0x1F319),
  sun: String.fromCodePoint(0x2600),
  star: String.fromCodePoint(0x2B50),
  check: "\u2713",
  cross: "\u2717",
  arrow: "\u2192",
  yes: String.fromCodePoint(0x2705),
  no: String.fromCodePoint(0x274C)
};

var NIGHTS = [
  {
    title: "Night 1 - Early Innings",
    subtitle: "Monday, April 6",
    icon: E.sun,
    color: "#f59e0b",
    mult2: 1.2,
    mult3: 1.8,
    innings: [
      { num: 1, cat: "K King", icon: E.fire, desc: "Which pitcher records the most strikeouts tonight?",
        opts: [
          { name: "Jacob Misiorowski", tag: "MIL", info: "vs BOS - 18 K in 11 IP - Elite swing-and-miss" },
          { name: "Garrett Crochet", tag: "BOS", info: "vs MIL - 15 K in 11 IP - High-K duel at Fenway" },
          { name: "Gavin Williams", tag: "CLE", info: "vs KC - 10 K last start vs LAD - 7 shutout innings" }
        ]},
      { num: 2, cat: "Extra Bases", icon: E.bat, desc: "Which batter has the most total bases tonight?",
        opts: [
          { name: "Yordan Alvarez", tag: "HOU", info: "@ COL - Coors Field + HOU leads MLB in OPS" },
          { name: "Andy Pages", tag: "LAD", info: "@ TOR - 16-for-34 (.471) - 3 HR - Best hitter on LAD" },
          { name: "Shea Langeliers", tag: "OAK", info: "@ NYY - 5 HR in 6 games - Tied MLB HR lead" }
        ]},
      { num: 3, cat: "RBI Machine", icon: E.flex, desc: "Which batter drives in the most runs tonight?",
        opts: [
          { name: "Shohei Ohtani", tag: "LAD", info: "@ TOR - Dodgers 1st in BA, SLG, HR - 14 runs last night" },
          { name: "Jose Ramirez", tag: "CLE", info: "vs KC - Franchise record 1,620 games - Heart of lineup" },
          { name: "Adolis Garcia", tag: "PHI", info: "@ SF - .835 OPS - 2nd on Phillies - New scenery working" }
        ]}
    ]
  },
  {
    title: "Night 2 - Middle Innings",
    subtitle: "Tuesday, April 7",
    icon: E.chart,
    color: "#f97316",
    mult2: 1.5,
    mult3: 2.5,
    innings: [
      { num: 4, cat: "Gone Yard", icon: E.bomb, desc: "Which batter hits a home run tonight?",
        opts: [
          { name: "Colt Keith", tag: "DET", info: "@ MIN - Surprise OPS leader for Tigers - Breakout candidate" },
          { name: "Ian Happ", tag: "CHC", info: "@ TB - 4 HR already - Cubs leader in SLG" },
          { name: "Vlad Guerrero Jr.", tag: "TOR", info: "vs LAD - WS rematch - Consistent at the plate" }
        ]},
      { num: 5, cat: "The Workhorse", icon: E.arm, desc: "Which starter records the most outs tonight?",
        opts: [
          { name: "Sandy Alcantara", tag: "MIA", info: "vs CIN - 0.00 ERA in 16 IP - 1.45 xERA - Elite workhorse" },
          { name: "Tarik Skubal", tag: "DET", info: "@ MIN - 0.69 ERA - 1 ER in 13 IP - Reigning Cy Young" },
          { name: "Cam Schlittler", tag: "NYY", info: "vs OAK - 0 runs in 11.2 IP - Weak A's lineup" }
        ]},
      { num: 6, cat: "Bases Loaded", icon: E.walk, desc: "Which batter reaches base the most times tonight?",
        opts: [
          { name: "Mike Trout", tag: "LAA", info: "vs ATL - Healthy start to 2026 - SEA pitched around him" },
          { name: "Andres Gimenez", tag: "CLE", info: "vs KC - MLB hits leader - 6 multi-hit games" },
          { name: "Joey Wiemer", tag: "MIL", info: "@ BOS - Reached base in first 10 PA of season" }
        ]}
    ]
  },
  {
    title: "Night 3 - Late Innings",
    subtitle: "Wednesday, April 8",
    icon: E.moon,
    color: "#ef4444",
    mult2: 2.0,
    mult3: 4.0,
    innings: [
      { num: 7, cat: "Speed Demon", icon: E.zap, desc: "Which player steals a base tonight?",
        opts: [
          { name: "Jose Altuve", tag: "HOU", info: "@ COL - 18 SB last year - Aggressive on bases" },
          { name: "Elly De La Cruz", tag: "CIN", info: "@ MIA - Elite sprint speed - 67 SB last year" },
          { name: "Bobby Witt Jr.", tag: "KC", info: "@ CLE - 30+ SB threat - Dynamic top of order" }
        ]},
      { num: 8, cat: "Punchout", icon: E.punch, desc: "Which batter strikes out the most tonight?",
        opts: [
          { name: "Julio Rodriguez", tag: "SEA", info: "@ TEX - 6-for-39 with 13 K - In a bad slump" },
          { name: "Cal Raleigh", tag: "SEA", info: "@ TEX - 5-for-38 with 20 K - Worst stretch of career" },
          { name: "Giancarlo Stanton", tag: "NYY", info: "vs OAK - .400 BA but 5 K in 25 PA - Hot yet volatile" }
        ]},
      { num: 9, cat: "The Closer", icon: E.door, desc: "Which reliever records the most strikeouts tonight?",
        opts: [
          { name: "Emmanuel Clase", tag: "CLE", info: "vs KC - 91% save rate - 0.82 ERA - Elite closer" },
          { name: "Braves Bullpen Arm", tag: "ATL", info: "@ LAA - Best bullpen ERA in MLB (1.08)" },
          { name: "Paul Sewald", tag: "ARI", info: "@ NYM - Veteran closer - High K rate in leverage spots" }
        ]}
    ]
  }
];

function App() {
  var s = useState("splash"); var view = s[0]; var setView = s[1];
  var s2 = useState(0); var nightIdx = s2[0]; var setNightIdx = s2[1];
  var s3 = useState(0); var pickIdx = s3[0]; var setPickIdx = s3[1];
  var s4 = useState(null); var sel = s4[0]; var setSel = s4[1];
  var s5 = useState(false); var locked = s5[0]; var setLocked = s5[1];
  var s6 = useState(false); var fading = s6[0]; var setFading = s6[1];
  var s7 = useState([]); var nightPicks = s7[0]; var setNightPicks = s7[1];
  var s8 = useState([]); var nightResults = s8[0]; var setNightResults = s8[1];
  var s9 = useState([]); var mults = s9[0]; var setMults = s9[1];
  var s10 = useState(5); var entry = s10[0];

  var night = NIGHTS[nightIdx];

  function reset() {
    setView("splash"); setNightIdx(0); setPickIdx(0); setSel(null);
    setLocked(false); setFading(false); setNightPicks([]); setNightResults([]); setMults([]);
  }

  function lockPick() {
    if (sel === null) return;
    setNightPicks(function(p) { return p.concat([sel]); });
    setLocked(true);
  }

  function nextPick() {
    if (fading) return;
    if (pickIdx < 2) {
      setFading(true);
      setTimeout(function() { setPickIdx(function(p){return p+1}); setSel(null); setLocked(false); setFading(false); }, 280);
    } else {
      var results = nightPicks.concat([sel]).map(function() { return Math.random() > 0.45; });
      setNightResults(function(p) { return p.concat([results]); });
      var correct = results.filter(Boolean).length;
      if (correct >= 2) {
        var m = correct === 3 ? night.mult3 : night.mult2;
        setMults(function(p) { return p.concat([m]); });
      }
      setView("nightResult");
    }
  }

  function getCurrentMult() {
    var m = 1;
    mults.forEach(function(v) { m = m * v; });
    return m;
  }

  function startNight() {
    setPickIdx(0); setSel(null); setLocked(false); setNightPicks([]); setView("pick");
  }

  // SPLASH
  if (view === "splash") {
    return (
      <div style={ST.ctr}>
        <div style={ST.splash}>
          <svg width="100" height="100" viewBox="0 0 120 120">
            <g transform="translate(60,15)">
              <polygon points="0,0 45,40 0,80 -45,40" fill="none" stroke="#f59e0b" strokeWidth="2.5"/>
              <circle cx="0" cy="0" r="6" fill="#f59e0b"/><circle cx="45" cy="40" r="6" fill="#f59e0b"/>
              <circle cx="0" cy="80" r="6" fill="#f59e0b"/><circle cx="-45" cy="40" r="6" fill="#f59e0b"/>
              <circle cx="0" cy="35" r="4" fill="#ef4444"/>
            </g>
          </svg>
          <h1 style={{fontSize:28,fontWeight:800,margin:0}}>Around the Horn</h1>
          <p style={{fontSize:14,color:"#999",margin:0}}>3 Nights. 9 Picks. One Series.</p>
          <div style={ST.box}>
            <p style={{fontSize:13,color:"#aaa",lineHeight:"1.5",margin:"0 0 12px"}}>
              Play a 3-night series. Each night you make 3 player prop picks. Hit 2 of 3 to advance. Your multiplier compounds each night. Cash out anytime or push for a bigger payout.
            </p>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {NIGHTS.map(function(n,i) {
                return (
                  <div key={i} style={{flex:1,background:"#111",borderRadius:10,padding:"10px 8px",border:"1px solid #222",textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#555",fontWeight:600,marginBottom:4}}>{"NIGHT "+(i+1)}</div>
                    <div style={{fontSize:13,fontWeight:700,color:n.color}}>{n.icon}</div>
                    <div style={{fontSize:10,color:"#666",marginTop:2}}>{"2/3: "+n.mult2+"x"}</div>
                    <div style={{fontSize:10,color:n.color,fontWeight:700}}>{"3/3: "+n.mult3+"x"}</div>
                  </div>
                );
              })}
            </div>
            <div style={{borderTop:"1px solid #222",paddingTop:10}}>
              <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
                <span style={{fontSize:12,color:"#666"}}>Floor (2-2-2)</span>
                <span style={{fontSize:12,color:"#fff",fontWeight:700}}>3.6x ($18)</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
                <span style={{fontSize:12,color:"#666"}}>Mid (3-2-3)</span>
                <span style={{fontSize:12,color:"#f97316",fontWeight:700}}>10.8x ($54)</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
                <span style={{fontSize:12,color:NIGHTS[2].color}}>Perfect (3-3-3)</span>
                <span style={{fontSize:12,color:NIGHTS[2].color,fontWeight:700}}>{"18x ($90) "+E.trophy}</span>
              </div>
            </div>
          </div>
          <button onClick={function(){setView("nightIntro")}} style={ST.mainBtn}>{"Play Series \u2014 $5 Entry"}</button>
        </div>
      </div>
    );
  }

  // NIGHT INTRO
  if (view === "nightIntro") {
    var cats = night.innings.map(function(inn) { return inn.icon + " " + inn.cat; });
    return (
      <div style={ST.ctr}>
        <div style={ST.splash}>
          <div style={{fontSize:48,lineHeight:1}}>{night.icon}</div>
          <h2 style={{fontSize:22,fontWeight:800,margin:0,color:night.color}}>{night.title}</h2>
          <p style={{fontSize:13,color:"#888",margin:0}}>{night.subtitle}</p>
          {nightIdx > 0 && (
            <div style={{background:"#1a1a1a",borderRadius:10,padding:"10px 16px",marginTop:8}}>
              <span style={{fontSize:13,color:"#999"}}>Current multiplier: </span>
              <span style={{fontSize:16,fontWeight:800,color:"#f59e0b"}}>{getCurrentMult().toFixed(1)+"x"}</span>
              <span style={{fontSize:12,color:"#666",marginLeft:6}}>{"($"+(getCurrentMult()*entry).toFixed(2)+")"}</span>
            </div>
          )}
          <div style={{background:"#1a1a1a",borderRadius:12,padding:"14px 18px",width:"100%",maxWidth:320,marginTop:12}}>
            <p style={{fontSize:12,color:"#666",margin:"0 0 8px",fontWeight:600}}>TONIGHT'S CATEGORIES</p>
            {night.innings.map(function(inn,i) {
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderTop:i>0?"1px solid #222":"none"}}>
                  <span style={{fontSize:16}}>{inn.icon}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{inn.cat}</div>
                    <div style={{fontSize:11,color:"#666"}}>{inn.desc}</div>
                  </div>
                </div>
              );
            })}
            <div style={{marginTop:10,padding:"8px 0 0",borderTop:"1px solid #222",display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:12,color:"#888"}}>2 of 3 correct</span>
              <span style={{fontSize:12,fontWeight:700,color:night.color}}>{"Survive (" + night.mult2 + "x)"}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}>
              <span style={{fontSize:12,color:"#888"}}>3 of 3 correct</span>
              <span style={{fontSize:12,fontWeight:700,color:night.color}}>{"Sweep (" + night.mult3 + "x)"}</span>
            </div>
          </div>
          {nightIdx > 0 && (
            <button onClick={function(){setView("cashout")}} style={{marginTop:16,background:"#333",color:"#fff",border:"none",borderRadius:12,padding:"13px 0",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:320}}>
              {E.money + " Cash Out at " + getCurrentMult().toFixed(1) + "x ($" + (getCurrentMult()*entry).toFixed(2) + ")"}
            </button>
          )}
          <button onClick={startNight} style={{marginTop:nightIdx>0?8:16,background:night.color,color:"#000",border:"none",borderRadius:12,padding:"14px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:320}}>
            {nightIdx > 0 ? "Push to Night " + (nightIdx+1) + " " + E.arrow : "Start Night 1"}
          </button>
        </div>
      </div>
    );
  }

  // CASHOUT
  if (view === "cashout") {
    var cm = getCurrentMult();
    return (
      <div style={ST.ctr}>
        <div style={ST.splash}>
          <div style={{fontSize:48,lineHeight:1}}>{E.money}</div>
          <h2 style={{fontSize:22,fontWeight:800,margin:0}}>Cash Out?</h2>
          <div style={{width:100,height:100,borderRadius:"50%",border:"3px solid #f59e0b",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",marginTop:8}}>
            <span style={{fontSize:28,fontWeight:800,color:"#f59e0b"}}>{cm.toFixed(1)+"x"}</span>
            <span style={{fontSize:13,color:"#888"}}>{"$"+(cm*entry).toFixed(2)}</span>
          </div>
          <div style={{background:"#1a1a1a",borderRadius:12,padding:"14px 18px",width:"100%",maxWidth:320,marginTop:12}}>
            <p style={{fontSize:13,color:"#aaa",lineHeight:"1.5",margin:0}}>
              {"You've survived " + nightIdx + " night" + (nightIdx>1?"s":"") + ". Lock in your profit now, or push to Night " + (nightIdx+1) + " where " + (nightIdx===1?"medium":"high") + "-variance picks could multiply your payout" + (nightIdx===1?" up to " + (cm*night.mult3).toFixed(1)+"x":"") + " \u2014 or end your run."}
            </p>
          </div>
          <button onClick={function(){setView("cashedOut")}} style={{marginTop:16,background:"#22c55e",color:"#000",border:"none",borderRadius:12,padding:"14px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:320}}>
            {E.money + " Lock In $" + (cm*entry).toFixed(2)}
          </button>
          <button onClick={startNight} style={{marginTop:8,background:night.color,color:"#000",border:"none",borderRadius:12,padding:"14px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:320}}>
            {"Keep Going " + E.arrow}
          </button>
        </div>
      </div>
    );
  }

  // CASHED OUT
  if (view === "cashedOut") {
    var cm = getCurrentMult();
    return (
      <div style={ST.ctr}>
        <div style={ST.splash}>
          <div style={{fontSize:56,lineHeight:1}}>{E.money}</div>
          <h2 style={{fontSize:22,fontWeight:800,margin:0,color:"#22c55e"}}>Cashed Out!</h2>
          <div style={{fontSize:32,fontWeight:800,color:"#f59e0b",marginTop:8}}>{"$"+(cm*entry).toFixed(2)}</div>
          <p style={{fontSize:14,color:"#888",marginTop:4}}>{"on a $" + entry + " entry (" + cm.toFixed(1) + "x)"}</p>
          <div style={{background:"#1a1a1a",borderRadius:12,padding:"14px 18px",width:"100%",maxWidth:320,marginTop:12}}>
            {nightResults.map(function(res,ni) {
              var c = res.filter(Boolean).length;
              return (
                <div key={ni} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:ni>0?"1px solid #222":"none"}}>
                  <span style={{fontSize:13,color:"#aaa"}}>{"Night "+(ni+1)}</span>
                  <span style={{fontSize:13,fontWeight:700,color:c===3?"#22c55e":"#f59e0b"}}>{c+"/3 " + (c===3?"Swept":"Survived")}</span>
                  <span style={{fontSize:13,fontWeight:700,color:NIGHTS[ni].color}}>{mults[ni]+"x"}</span>
                </div>
              );
            })}
          </div>
          <button onClick={reset} style={{marginTop:20,background:"#f59e0b",color:"#000",border:"none",borderRadius:12,padding:"14px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:320}}>
            Play New Series
          </button>
        </div>
      </div>
    );
  }

  // NIGHT RESULT
  if (view === "nightResult") {
    var lastRes = nightResults[nightResults.length - 1];
    var correct = lastRes ? lastRes.filter(Boolean).length : 0;
    var survived = correct >= 2;
    var swept = correct === 3;
    var thisMult = swept ? night.mult3 : survived ? night.mult2 : 0;
    var totalMult = getCurrentMult();
    var isLastNight = nightIdx === 2;
    var eliminated = !survived;

    return (
      <div style={ST.ctr}>
        <div style={ST.splash}>
          <h2 style={{fontSize:20,fontWeight:800,margin:0,color:night.color}}>{night.title + " Results"}</h2>
          {eliminated && <div style={{fontSize:48,lineHeight:1,marginTop:8}}>{E.cross}</div>}
          {survived && <div style={{fontSize:48,lineHeight:1,marginTop:8}}>{swept ? E.fire : E.check}</div>}
          <div style={{fontSize:18,fontWeight:700,margin:"8px 0",color:eliminated?"#ef4444":swept?"#22c55e":"#f59e0b"}}>
            {eliminated ? "Eliminated" : swept ? "Swept! "+night.mult3+"x" : "Survived! "+night.mult2+"x"}
          </div>
          <div style={{width:"100%",maxWidth:320,display:"flex",flexDirection:"column",gap:6}}>
            {night.innings.map(function(inn,i) {
              var hit = lastRes && lastRes[i];
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,
                  border:"1px solid "+(hit?"#22c55e":"#ef4444"),background:hit?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.06)"}}>
                  <span style={{fontSize:16}}>{inn.icon}</span>
                  <span style={{fontSize:13,fontWeight:600,color:"#bbb",flex:1}}>{inn.cat}</span>
                  <span style={{fontWeight:700,fontSize:14,color:hit?"#22c55e":"#ef4444"}}>{hit?E.check:E.cross}</span>
                </div>
              );
            })}
          </div>
          {survived && !isLastNight && (
            <div style={{background:"#1a1a1a",borderRadius:10,padding:"10px 16px",marginTop:12,width:"100%",maxWidth:320}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:13,color:"#888"}}>Cumulative multiplier</span>
                <span style={{fontSize:16,fontWeight:800,color:"#f59e0b"}}>{totalMult.toFixed(1)+"x"}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                <span style={{fontSize:12,color:"#666"}}>Current value</span>
                <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{"$"+(totalMult*entry).toFixed(2)}</span>
              </div>
            </div>
          )}
          {survived && isLastNight && (
            <div style={{background:"rgba(245,158,11,0.1)",borderRadius:12,padding:"16px",marginTop:12,textAlign:"center",width:"100%",maxWidth:320}}>
              <div style={{fontSize:13,color:"#888"}}>Final Payout</div>
              <div style={{fontSize:36,fontWeight:800,color:"#f59e0b"}}>{totalMult.toFixed(1)+"x"}</div>
              <div style={{fontSize:20,fontWeight:700,color:"#22c55e"}}>{"$"+(totalMult*entry).toFixed(2)}</div>
              <div style={{fontSize:12,color:"#666",marginTop:4}}>{"on $"+entry+" entry"}</div>
            </div>
          )}
          {eliminated && (
            <button onClick={reset} style={{marginTop:16,background:"#f59e0b",color:"#000",border:"none",borderRadius:12,padding:"14px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:320}}>
              Try Again
            </button>
          )}
          {survived && isLastNight && (
            <button onClick={reset} style={{marginTop:16,background:"#22c55e",color:"#000",border:"none",borderRadius:12,padding:"14px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:320}}>
              {"Collect $"+(totalMult*entry).toFixed(2)+" "+E.trophy}
            </button>
          )}
          {survived && !isLastNight && (
            <button onClick={function(){setNightIdx(function(n){return n+1}); setView("nightIntro");}} style={{marginTop:16,background:NIGHTS[nightIdx+1].color,color:"#000",border:"none",borderRadius:12,padding:"14px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:320}}>
              {"Night " + (nightIdx+2) + " " + E.arrow}
            </button>
          )}
        </div>
      </div>
    );
  }

  // PICK SCREEN
  var inn = night.innings[pickIdx];
  return (
    <div style={ST.ctr}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0 8px"}}>
        <div style={{fontSize:12,color:"#666",fontWeight:600}}>{"NIGHT "+(nightIdx+1)+" OF 3"}</div>
        {nightIdx > 0 && <div style={{fontSize:12,color:"#f59e0b",fontWeight:700}}>{"Running: "+getCurrentMult().toFixed(1)+"x"}</div>}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:10,padding:"0 0 16px"}}>
        {[0,1,2].map(function(i) {
          var done = i < pickIdx || (i === pickIdx && locked);
          var active = i === pickIdx && !locked;
          return (
            <div key={i} style={{width:60,height:6,borderRadius:3,background:done?night.color:active?"#555":"#222"}} />
          );
        })}
      </div>

      <div style={{background:"#141414",borderRadius:16,padding:"18px 16px",border:"1px solid #222",
        opacity:fading?0:1,transform:fading?"translateX(-30px)":"translateX(0)",transition:"all 0.25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:11,color:"#555",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>{"Pick "+(pickIdx+1)+" of 3"}</span>
          <span style={{fontSize:14,fontWeight:700,color:night.color}}>{inn.icon+" "+inn.cat}</span>
        </div>
        <p style={{fontSize:16,fontWeight:600,color:"#eee",lineHeight:"1.4",margin:"0 0 14px"}}>{inn.desc}</p>

        {inn.opts.map(function(opt, i) {
          return (
            <button key={i} disabled={locked} onClick={function(){setSel(i)}}
              style={{width:"100%",textAlign:"left",border:"2px solid "+(sel===i?"#f59e0b":"#333"),
                borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:locked?"default":"pointer",
                background:sel===i?"rgba(245,158,11,0.1)":"#1a1a1a",
                opacity:locked&&sel!==i?0.35:1,display:"block"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:15,fontWeight:700,color:"#fff"}}>{opt.name}</span>
                {opt.tag && <span style={{fontSize:11,fontWeight:600,color:night.color,background:night.color+"22",padding:"2px 7px",borderRadius:5}}>{opt.tag}</span>}
              </div>
              <div style={{fontSize:11,color:"#777",marginTop:3,lineHeight:"1.3"}}>{opt.info}</div>
            </button>
          );
        })}
      </div>

      <div style={{padding:"16px 0 20px"}}>
        {!locked ? (
          <button onClick={lockPick} disabled={sel===null}
            style={{width:"100%",background:"#f59e0b",color:"#000",border:"none",borderRadius:12,
              padding:"15px 0",fontSize:16,fontWeight:700,cursor:sel===null?"default":"pointer",
              opacity:sel===null?0.35:1,maxWidth:400}}>
            {"Lock It In "+E.lock}
          </button>
        ) : (
          <button onClick={nextPick}
            style={{width:"100%",background:"#22c55e",color:"#000",border:"none",borderRadius:12,
              padding:"15px 0",fontSize:16,fontWeight:700,cursor:"pointer",maxWidth:400,
              opacity:fading?0.6:1}}>
            {pickIdx < 2 ? "Pick " + (pickIdx+2) + " " + E.arrow : "See Results "+E.trophy}
          </button>
        )}
      </div>
    </div>
  );
}

var ST = {
  ctr: {minHeight:"100vh",background:"#0d0d0d",color:"#fff",fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif",maxWidth:430,margin:"0 auto",padding:"14px 16px 50px",position:"relative"},
  splash: {display:"flex",flexDirection:"column",alignItems:"center",paddingTop:30,gap:8},
  box: {background:"#1a1a1a",borderRadius:14,padding:"16px 18px",width:"100%",maxWidth:340,marginTop:12},
  mainBtn: {marginTop:16,background:"#f59e0b",color:"#000",border:"none",borderRadius:12,padding:"15px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",maxWidth:340}
};

var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
