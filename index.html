<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0d0d; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; min-height:100vh; }
#app { max-width:420px; margin:0 auto; padding:14px 16px 50px; }
.hidden { display:none !important; }
button { font-family:inherit; cursor:pointer; }
.amber { color:#f59e0b; }

/* Splash */
.splash { display:flex; flex-direction:column; align-items:center; padding-top:36px; gap:8px; }
.splash h1 { font-size:28px; font-weight:800; }
.splash .sub { font-size:15px; color:#999; font-weight:500; }
.rules-box { background:#1a1a1a; border-radius:14px; padding:16px 20px; width:100%; max-width:340px; margin-top:16px; }
.rules-box p { font-size:13px; color:#aaa; line-height:1.5; margin-bottom:14px; }
.pay-row { display:flex; justify-content:space-between; padding:4px 0; }
.pay-row span:first-child { font-size:14px; font-weight:600; color:#777; }
.pay-row span:last-child { font-size:14px; font-weight:700; color:#eee; }
.pay-row.gold span { color:#f59e0b !important; }
.main-btn { margin-top:20px; background:#f59e0b; color:#000; border:none; border-radius:12px; padding:15px 0; font-size:16px; font-weight:700; width:100%; max-width:340px; }
.green-btn { background:#22c55e; }

/* Progress */
.dots { display:flex; justify-content:center; gap:7px; padding:6px 0 18px; align-items:center; }
.dot { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:8px; color:#000; font-weight:700; transition:all 0.3s; }
.dot.done { background:#f59e0b; border:2px solid #f59e0b; }
.dot.active { background:#000; border:2px solid #f59e0b; }
.dot.future { background:#2a2a2a; border:2px solid #333; }

/* Card */
.card { background:#141414; border-radius:16px; padding:18px 16px; border:1px solid #222; transition:opacity 0.25s, transform 0.25s; }
.card.fading { opacity:0; transform:translateX(-30px); }
.card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.card-head .inn-num { font-size:11px; color:#555; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
.card-head .inn-cat { font-size:14px; font-weight:700; color:#f59e0b; }
.card .desc { font-size:16px; font-weight:600; color:#eee; line-height:1.4; margin-bottom:6px; }
.card .note { font-size:12px; color:#666; margin-bottom:14px; line-height:1.4; }
.card .line-num { font-size:26px; font-weight:800; text-align:center; margin:10px 0 14px; }

/* Pick options */
.opt-btn { width:100%; text-align:left; border:2px solid #333; border-radius:12px; padding:12px 14px; background:#1a1a1a; margin-bottom:8px; display:block; }
.opt-btn .top { display:flex; justify-content:space-between; align-items:center; }
.opt-btn .nm { font-size:15px; font-weight:700; color:#fff; }
.opt-btn .tg { font-size:11px; font-weight:600; color:#f59e0b; background:rgba(245,158,11,0.15); padding:2px 7px; border-radius:5px; }
.opt-btn .dt { font-size:11px; color:#777; margin-top:3px; line-height:1.3; }
.opt-btn.sel { border-color:#f59e0b; background:rgba(245,158,11,0.1); }
.opt-btn.dim { opacity:0.3; pointer-events:none; }

/* Two buttons (O/U, Y/N) */
.two-wrap { display:flex; gap:12px; width:100%; }
.two-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; padding:16px 10px; border:2px solid #333; border-radius:12px; background:#1a1a1a; }
.two-btn .ico { font-size:20px; }
.two-btn .lb { font-size:14px; font-weight:700; color:#fff; }
.two-btn.sel-g { border-color:#22c55e; background:rgba(34,197,94,0.12); }
.two-btn.sel-r { border-color:#ef4444; background:rgba(239,68,68,0.1); }
.two-btn.dim { opacity:0.3; pointer-events:none; }

/* Action */
.action { padding:18px 0 20px; }

/* Results */
.results { display:flex; flex-direction:column; align-items:center; padding-top:28px; gap:14px; }
.results h2 { font-size:22px; font-weight:800; text-align:center; }
.score-ring { width:88px; height:88px; border-radius:50%; border:3px solid #f59e0b; display:flex; align-items:center; justify-content:center; }
.score-ring .num { font-size:36px; font-weight:800; color:#f59e0b; }
.score-ring .of { font-size:18px; color:#666; font-weight:600; margin-top:8px; }
.payout-tag { background:rgba(245,158,11,0.12); border-radius:8px; padding:6px 16px; font-size:16px; font-weight:700; color:#f59e0b; }
.res-list { width:100%; max-width:340px; display:flex; flex-direction:column; gap:5px; margin-top:6px; }
.res-row { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:9px; border:1px solid; }
.res-row .ico { font-size:15px; }
.res-row .cat { font-size:13px; font-weight:600; color:#bbb; flex:1; }
.res-row .mark { font-weight:700; font-size:14px; }
.res-row.hit { border-color:#22c55e; background:rgba(34,197,94,0.08); }
.res-row.miss { border-color:#ef4444; background:rgba(239,68,68,0.06); }
</style>
</head>
<body>
<div id="app">
  <div id="splash" class="splash">
    <svg width="100" height="100" viewBox="0 0 120 120">
      <g transform="translate(60,15)">
        <polygon points="0,0 45,40 0,80 -45,40" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
        <circle cx="0" cy="0" r="6" fill="#f59e0b"/><circle cx="45" cy="40" r="6" fill="#f59e0b"/>
        <circle cx="0" cy="80" r="6" fill="#f59e0b"/><circle cx="-45" cy="40" r="6" fill="#f59e0b"/>
        <circle cx="0" cy="35" r="4" fill="#ef4444"/>
      </g>
    </svg>
    <h1>Around the Horn</h1>
    <div class="sub">9 Innings. 9 Picks. One Shot.</div>
    <div class="rules-box">
      <p>Work your way around the diamond &mdash; one inning at a time. Each inning is a different prop category. You can't see what's next until you lock in.</p>
      <div class="pay-row"><span>5/9</span><span>1x</span></div>
      <div class="pay-row"><span>6/9</span><span>2x</span></div>
      <div class="pay-row"><span>7/9</span><span>5x</span></div>
      <div class="pay-row"><span>8/9</span><span>15x</span></div>
      <div class="pay-row gold"><span>9/9</span><span>50x &#127942;</span></div>
    </div>
    <button class="main-btn" onclick="startGame()">Play &mdash; $5 Entry</button>
  </div>

  <div id="game" class="hidden">
    <div id="dots" class="dots"></div>
    <div id="card" class="card"></div>
    <div id="action" class="action"></div>
  </div>

  <div id="results" class="results hidden"></div>
</div>

<script>
var innings = [
  {n:1,cat:"K King",ico:"\uD83D\uDD25",desc:"Which pitcher records the most strikeouts tonight?",t:"p3",
   opts:[{nm:"Corbin Burns",tg:"ARI",dt:"vs LAD \u2022 9.8 K/9 \u2022 L10: 8.2 avg K"},
         {nm:"Zack Wheeler",tg:"PHI",dt:"vs ATL \u2022 10.1 K/9 \u2022 L10: 7.5 avg K"},
         {nm:"Logan Webb",tg:"SF",dt:"vs SD \u2022 7.9 K/9 \u2022 L10: 6.8 avg K"}]},
  {n:2,cat:"Gone Yard",ico:"\uD83D\uDCA3",desc:"Over/Under on total HRs across tonight's slate?",t:"ou",line:12.5,
   note:"Season avg: 13.1 per 8-game slate \u2022 Wind out at Wrigley & Coors"},
  {n:3,cat:"Speed Demon",ico:"\u26A1",desc:"Will there be a stolen base in the first 3 innings?",t:"yn",
   note:"HOU @ TEX \u2022 Altuve (18 SB) & Semien (14 SB) in lineup"},
  {n:4,cat:"RBI Machine",ico:"\uD83D\uDCAA",desc:"Which batter drives in the most runs tonight?",t:"p3",
   opts:[{nm:"Aaron Judge",tg:"NYY",dt:"vs BOS \u2022 .312 BA w/RISP \u2022 Batting 2nd"},
         {nm:"Mookie Betts",tg:"LAD",dt:"vs ARI \u2022 .298 BA w/RISP \u2022 Batting 1st"},
         {nm:"Kyle Tucker",tg:"HOU",dt:"vs TEX \u2022 .285 BA w/RISP \u2022 Batting 3rd"}]},
  {n:5,cat:"Pitcher's Duel",ico:"\uD83E\uDD10",desc:"Which game has the lowest combined score?",t:"p3",
   opts:[{nm:"MIL @ PIT",tg:"",dt:"O/U 6.5 \u2022 Both starters sub-3.00 ERA"},
         {nm:"SF @ SD",tg:"",dt:"O/U 7.0 \u2022 Petco Park suppresses HRs"},
         {nm:"CLE @ DET",tg:"",dt:"O/U 7.5 \u2022 Strong bullpens both sides"}]},
  {n:6,cat:"Extra Bases",ico:"\uD83C\uDFC3",desc:"Which batter has the most total bases tonight?",t:"p3",
   opts:[{nm:"Shohei Ohtani",tg:"LAD",dt:"vs ARI \u2022 1.012 OPS L14 \u2022 3 HR last week"},
         {nm:"Juan Soto",tg:"NYY",dt:"vs BOS \u2022 .978 OPS L14 \u2022 Fenway short porch"},
         {nm:"Ronald Acuna Jr.",tg:"ATL",dt:"vs PHI \u2022 .891 OPS L14 \u2022 2B machine"}]},
  {n:7,cat:"First Blood",ico:"\uD83E\uDE78",desc:"Which game has a run scored first?",t:"p3",
   opts:[{nm:"NYY @ BOS",tg:"",dt:"Both lineups top-5 in 1st inning runs"},
         {nm:"LAD @ ARI",tg:"",dt:"LAD scores 1st in 64% of road games"},
         {nm:"HOU @ TEX",tg:"",dt:"Rivalry game \u2022 HOU avg 0.8 runs in 1st"}]},
  {n:8,cat:"Iron Man",ico:"\uD83D\uDEE1",desc:"Which starter goes the deepest tonight?",t:"p3",
   opts:[{nm:"Framber Valdez",tg:"HOU",dt:"Avg 6.2 IP \u2022 73% QS rate \u2022 Ground ball king"},
         {nm:"Corbin Burns",tg:"ARI",dt:"Avg 6.4 IP \u2022 68% QS rate \u2022 Efficient counts"},
         {nm:"Aaron Nola",tg:"PHI",dt:"Avg 5.8 IP \u2022 61% QS rate \u2022 High K = high PC"}]},
  {n:9,cat:"The Closer",ico:"\uD83D\uDEAA",desc:"Does Emmanuel Clase convert the save?",t:"yn",
   note:"CLE @ DET \u2022 91% save rate \u2022 0.82 ERA \u2022 DET bottom-5 late OPS"}
];

var payMap = {5:"1x (Break Even)",6:"2x",7:"5x",8:"15x",9:"50x \uD83C\uDFC6"};
var idx = 0, sel = null, locked = false;

function show(id) {
  ["splash","game","results"].forEach(function(s) {
    document.getElementById(s).classList.toggle("hidden", s !== id);
  });
}

function startGame() { idx=0; sel=null; locked=false; show("game"); renderInning(); }

function renderDots() {
  var h = "";
  for (var i=0; i<9; i++) {
    var cls = i<idx?"done":i===idx?"active":"future";
    h += '<div class="dot '+cls+'">'+(i<idx?"\u2713":"")+'</div>';
  }
  document.getElementById("dots").innerHTML = h;
}

function renderInning() {
  sel = null; locked = false;
  renderDots();
  var inn = innings[idx];
  var c = document.getElementById("card");
  c.className = "card";

  var html = '<div class="card-head"><span class="inn-num">Inning '+inn.n+'</span><span class="inn-cat">'+inn.ico+' '+inn.cat+'</span></div>';
  html += '<div class="desc">'+inn.desc+'</div>';
  if (inn.note) html += '<div class="note">'+inn.note+'</div>';
  if (inn.line != null) html += '<div class="line-num">Line: '+inn.line+'</div>';

  if (inn.t === "p3") {
    for (var i=0; i<inn.opts.length; i++) {
      var o = inn.opts[i];
      html += '<button class="opt-btn" data-i="'+i+'" onclick="pickOpt('+i+')">';
      html += '<div class="top"><span class="nm">'+o.nm+'</span>';
      if (o.tg) html += '<span class="tg">'+o.tg+'</span>';
      html += '</div><div class="dt">'+o.dt+'</div></button>';
    }
  }

  if (inn.t === "ou") {
    html += '<div class="two-wrap">';
    html += '<button class="two-btn" data-v="0" onclick="pickTwo(0)"><span class="ico">\u2B06\uFE0F</span><span class="lb">Over '+inn.line+'</span></button>';
    html += '<button class="two-btn" data-v="1" onclick="pickTwo(1)"><span class="ico">\u2B07\uFE0F</span><span class="lb">Under '+inn.line+'</span></button>';
    html += '</div>';
  }

  if (inn.t === "yn") {
    html += '<div class="two-wrap">';
    html += '<button class="two-btn" data-v="0" onclick="pickTwo(0)"><span class="ico">\u2705</span><span class="lb">Yes</span></button>';
    html += '<button class="two-btn" data-v="1" onclick="pickTwo(1)"><span class="ico">\u274C</span><span class="lb">No</span></button>';
    html += '</div>';
  }

  c.innerHTML = html;
  renderAction();
}

function pickOpt(i) {
  if (locked) return;
  sel = i;
  var btns = document.querySelectorAll(".opt-btn");
  btns.forEach(function(b) { b.className = "opt-btn"; });
  btns[i].classList.add("sel");
  renderAction();
}

function pickTwo(v) {
  if (locked) return;
  sel = v;
  var btns = document.querySelectorAll(".two-btn");
  btns.forEach(function(b) { b.className = "two-btn"; });
  if (v === 0) btns[0].classList.add("sel-g");
  else btns[1].classList.add("sel-r");
  renderAction();
}

function renderAction() {
  var a = document.getElementById("action");
  if (!locked) {
    var dis = sel === null ? ' disabled style="opacity:0.35;cursor:default"' : '';
    a.innerHTML = '<button class="main-btn"'+dis+' onclick="doLock()">Lock It In \uD83D\uDD12</button>';
  } else {
    var label = idx < 8 ? "Inning "+(idx+2)+" \u2192" : "See Results \uD83C\uDFC6";
    a.innerHTML = '<button class="main-btn green-btn" onclick="doNext()">'+label+'</button>';
  }
}

function doLock() {
  if (sel === null) return;
  locked = true;
  // Dim unselected options
  var inn = innings[idx];
  if (inn.t === "p3") {
    var btns = document.querySelectorAll(".opt-btn");
    btns.forEach(function(b,i) { if (i !== sel) b.classList.add("dim"); });
  } else {
    var btns = document.querySelectorAll(".two-btn");
    btns.forEach(function(b,i) { if (i !== sel) b.classList.add("dim"); });
  }
  renderAction();
}

function doNext() {
  if (idx < 8) {
    var c = document.getElementById("card");
    c.classList.add("fading");
    setTimeout(function() { idx++; renderInning(); }, 280);
  } else {
    showResults();
  }
}

function showResults() {
  show("results");
  var score = Math.floor(Math.random()*5)+5;
  var hits = {};
  while (Object.keys(hits).length < score) { hits[Math.floor(Math.random()*9)] = true; }

  var title = "Tough Break";
  if (score===9) title="\uD83C\uDFC6 PERFECT GAME \uD83C\uDFC6";
  else if (score>=7) title="\uD83D\uDD25 Great Round!";
  else if (score>=5) title="Solid Night";

  var html = '<h2>'+title+'</h2>';
  html += '<div class="score-ring"><span class="num">'+score+'</span><span class="of">/9</span></div>';
  if (score>=5) html += '<div class="payout-tag">'+payMap[score]+'</div>';
  html += '<div class="res-list">';
  for (var i=0; i<9; i++) {
    var hit = !!hits[i];
    var cls = hit ? "hit" : "miss";
    var mark = hit ? '<span class="mark" style="color:#22c55e">\u2713</span>' : '<span class="mark" style="color:#ef4444">\u2717</span>';
    html += '<div class="res-row '+cls+'"><span class="ico">'+innings[i].ico+'</span><span class="cat">'+innings[i].cat+'</span>'+mark+'</div>';
  }
  html += '</div>';
  html += '<button class="main-btn" style="margin-top:16px;max-width:340px" onclick="startGame();show(\'game\')">Play Again</button>';
  html += '<button class="main-btn" style="margin-top:8px;max-width:340px;background:#333;color:#fff" onclick="show(\'splash\')">Home</button>';

  document.getElementById("results").innerHTML = html;
}
</script>
</body>
</html>
